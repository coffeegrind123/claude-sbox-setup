<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>claude-sbox · 512×512</title>
<!--
  512×512 thumbnail. Optimised for legibility when displayed at
  128×128 and 256×256 on sbox.game listings. Heavy content (dek,
  stats grid, CLI command, port number) has been removed — only
  the wordmark + a single tagline survive thumbnail-scaling.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:       #F4EEE3;
    --ink:         #1A1714;
    --ink-soft:    #463E36;
    --muted:       #8A7F70;
    --rule:        rgba(26, 23, 20, 0.16);
    --accent:      #C0512F;
    --accent-deep: #9A3F22;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
  }
  @media (min-width: 600px) {
    html, body { width: auto; height: auto; background: #2a2522; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .poster { box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  }

  .poster {
    width: 512px;
    height: 512px;
    position: relative;
    background:
      radial-gradient(ellipse 90% 60% at 85% 15%, rgba(192,81,47,0.07), transparent 65%),
      radial-gradient(ellipse 70% 50% at 15% 90%, rgba(47,91,79,0.04), transparent 65%),
      var(--paper);
    overflow: hidden;
  }
  .poster::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(26,23,20,0.014) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(26,23,20,0.012) 0 1px, transparent 1px 4px);
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  /* watermark — barely visible at 512, vanishes to texture at thumb sizes */
  .wm {
    position: absolute;
    bottom: -48px;
    right: -28px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 320px;
    line-height: 1;
    color: var(--ink);
    opacity: 0.035;
    pointer-events: none;
    letter-spacing: -0.07em;
  }

  /* corner ticks instead of full registration marks — survives downscale better */
  .tick {
    position: absolute;
    width: 22px;
    height: 22px;
    border: 0 solid var(--ink);
    opacity: 0.7;
  }
  .tick.tl { top: 22px; left: 22px;  border-top-width: 1.5px; border-left-width: 1.5px; }
  .tick.tr { top: 22px; right: 22px; border-top-width: 1.5px; border-right-width: 1.5px; }
  .tick.bl { bottom: 22px; left: 22px;  border-bottom-width: 1.5px; border-left-width: 1.5px; }
  .tick.br { bottom: 22px; right: 22px; border-bottom-width: 1.5px; border-right-width: 1.5px; }

  .frame {
    position: absolute;
    inset: 56px 52px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  h1 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-variation-settings: "opsz" 144, "SOFT" 30, "WONK" 1;
    font-size: 124px;
    line-height: 0.86;
    letter-spacing: -0.055em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  h1 .dot {
    color: var(--accent);
    font-style: italic;
    font-weight: 400;
    font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
    transform: translateY(-6px);
  }
  h1 .line {
    display: block;
  }
  .word-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    line-height: 0.86;
  }

  .tag {
    margin-top: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .tag .pip { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }
  .tag .num { color: var(--accent-deep); font-weight: 700; letter-spacing: 0.05em; }

  .org {
    position: absolute;
    bottom: 30px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .org .at { color: var(--accent); }
</style>
</head>
<body>
<main class="poster" role="img" aria-label="claude-sbox — Claude Code for the s&box editor.">

  <span class="tick tl"></span>
  <span class="tick tr"></span>
  <span class="tick bl"></span>
  <span class="tick br"></span>

  <div class="wm">593</div>

  <div class="frame">
    <h1>
      <div class="word-stack">
        <span class="line">claude</span>
        <span class="line">sbox</span>
      </div>
    </h1>

    <div class="tag">
      <span class="pip"></span>
      <span><span class="num">593</span> MCP tools</span>
    </div>
  </div>

  <div class="org">ghage<span class="at"> / </span>claude-sbox</div>

</main>
</body>
</html>
